<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Filter Panel & Faceted Search Demo</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eeefff;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .header-demo {
      max-width: 1200px;
      margin: 0 auto 24px;
    }

    .header-demo h1 {
      font-size: 1.75rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .header-demo p {
      color: var(--text-muted);
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* Mobile trigger button */
    .mobile-filter-trigger {
      display: none;
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      margin-bottom: 16px;
      align-items: center;
      justify-content: space-between;
    }

    /* Filter Panel Container */
    .filter-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .filter-header h2 {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .btn-reset {
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn-reset:hover {
      text-decoration: underline;
    }

    .filter-group {
      border: none;
      margin-bottom: 20px;
      padding: 0;
    }

    .filter-legend {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 12px;
      color: var(--text);
      width: 100%;
    }

    .filter-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Custom Checkbox */
    .custom-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      font-size: 0.9rem;
      user-select: none;
    }

    .custom-checkbox input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checkmark {
      width: 18px;
      height: 18px;
      border: 2px solid #cbd5e1;
      border-radius: 4px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .custom-checkbox input[type="checkbox"]:focus-visible + .checkmark {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .custom-checkbox input[type="checkbox"]:checked + .checkmark {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    .custom-checkbox input[type="checkbox"]:checked + .checkmark::after {
      content: "";
      width: 4px;
      height: 8px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    .label-text {
      flex: 1;
    }

    .count {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* Range Slider */
    .price-range {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .price-values {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
      cursor: pointer;
    }

    /* Main Content Area */
    .main-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Active Filter Chips */
    .active-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 32px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .chip button {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .product-badge {
      align-self: start;
      background: #e2e8f0;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: capitalize;
    }

    .product-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .product-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .product-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* Mobile Responsive styles */
    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .mobile-filter-trigger {
        display: flex;
      }

      .filter-panel {
        position: fixed;
        inset: 0;
        z-index: 1000;
        border-radius: 0;
        display: none;
        flex-direction: column;
        overflow-y: auto;
      }

      .filter-panel.is-open {
        display: flex;
      }

      .mobile-close-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        margin-top: auto;
        cursor: pointer;
      }
    }
  </style>
</head>
<body>

  <header class="header-demo">
    <h1>Advanced Filter Panel & Faceted Search</h1>
    <p>Demo interaktif pola filter dengan live counter, chips aktif, dan aksesibilitas lengkap (WCAG).</p>
  </header>

  <div class="layout">
    <!-- Trigger Button for Mobile -->
    <button type="button" class="mobile-filter-trigger" id="open-mobile-filter" aria-haspopup="dialog">
      <span>⚙️ Opsi Filter</span>
      <span id="mobile-filter-count" class="chip">0</span>
    </button>

    <!-- Filter Panel Sidebar / Mobile Drawer -->
    <aside class="filter-panel" id="filter-panel" aria-label="Filter Hasil Produk">
      <div class="filter-header">
        <h2>Filter</h2>
        <button type="button" id="reset-all" class="btn-reset">Hapus Semua</button>
      </div>

      <form id="filter-form">
        <!-- Group 1: Kategori -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Kategori Produk</legend>
          <div class="filter-options">
            <label class="custom-checkbox">
              <input type="checkbox" name="category" value="electronics">
              <span class="checkmark"></span>
              <span class="label-text">Elektronik</span>
              <span class="count" id="count-electronics">(0)</span>
            </label>
            <label class="custom-checkbox">
              <input type="checkbox" name="category" value="fashion">
              <span class="checkmark"></span>
              <span class="label-text">Fashion</span>
              <span class="count" id="count-fashion">(0)</span>
            </label>
            <label class="custom-checkbox">
              <input type="checkbox" name="category" value="lifestyle">
              <span class="checkmark"></span>
              <span class="label-text">Lifestyle</span>
              <span class="count" id="count-lifestyle">(0)</span>
            </label>
          </div>
        </fieldset>

        <!-- Group 2: Maksimum Harga -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Harga Maksimum</legend>
          <div class="price-range">
            <input type="range" id="price-slider" name="maxPrice" min="100000" max="5000000" step="100000" value="5000000">
            <div class="price-values">
              Maks: <span id="price-display">Rp 5.000.000</span>
            </div>
          </div>
        </fieldset>

        <!-- Group 3: Status Stok -->
        <fieldset class="filter-group">
          <legend class="filter-legend">Ketersediaan</legend>
          <div class="filter-options">
            <label class="custom-checkbox">
              <input type="checkbox" name="inStockOnly" value="true">
              <span class="checkmark"></span>
              <span class="label-text">Stok Tersedia Saja</span>
            </label>
          </div>
        </fieldset>
      </form>

      <button type="button" class="mobile-close-btn" id="close-mobile-filter" style="display: none;">Terapkan & Tutup</button>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Active Chips Bar -->
      <div class="active-chips" id="active-chips-container" aria-label="Filter aktif">
        <!-- Insertion via JS -->
      </div>

      <!-- Result Grid -->
      <div class="product-grid" id="product-grid">
        <!-- Insertion via JS -->
      </div>
    </main>
  </div>

  <!-- Live Announcer for Screen Readers -->
  <div id="aria-announcer" class="sr-only" role="status" aria-live="polite"></div>

  <script>
    // Mock Data Produk
    const PRODUCTS = [
      { id: 1, name: 'Headphones Wireless Pro', category: 'electronics', price: 1500000, rating: 4.8, inStock: true },
      { id: 2, name: 'Smartwatch Series X', category: 'electronics', price: 3200000, rating: 4.6, inStock: false },
      { id: 3, name: 'Jaket Parka Waterproof', category: 'fashion', price: 650000, rating: 4.5, inStock: true },
      { id: 4, name: 'Sepatu Running Ultra', category: 'fashion', price: 1200000, rating: 4.9, inStock: true },
      { id: 5, name: 'Botol Minum Thermal 1L', category: 'lifestyle', price: 250000, rating: 4.7, inStock: true },
      { id: 6, name: 'Kamera Mirrorless 4K', category: 'electronics', price: 4800000, rating: 4.9, inStock: false },
      { id: 7, name: 'Kemeja Linen Casual', category: 'fashion', price: 450000, rating: 4.3, inStock: true },
      { id: 8, name: 'Matras Yoga Premium', category: 'lifestyle', price: 350000, rating: 4.6, inStock: true }
    ];

    // Elements
    const filterForm = document.getElementById('filter-form');
    const priceSlider = document.getElementById('price-slider');
    const priceDisplay = document.getElementById('price-display');
    const productGrid = document.getElementById('product-grid');
    const activeChipsContainer = document.getElementById('active-chips-container');
    const resetBtn = document.getElementById('reset-all');
    const ariaAnnouncer = document.getElementById('aria-announcer');
    const filterPanel = document.getElementById('filter-panel');
    const openMobileBtn = document.getElementById('open-mobile-filter');
    const closeMobileBtn = document.getElementById('close-mobile-filter');

    function formatRupiah(amount) {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(amount);
    }

    function updateCounts() {
      const categories = ['electronics', 'fashion', 'lifestyle'];
      categories.forEach(cat => {
        const count = PRODUCTS.filter(p => p.category === cat).length;
        document.getElementById(`count-${cat}`).textContent = `(${count})`;
      });
    }

    function getActiveFilters() {
      const formData = new FormData(filterForm);
      const selectedCategories = formData.getAll('category');
      const maxPrice = Number(priceSlider.value);
      const inStockOnly = formData.get('inStockOnly') === 'true';

      return { selectedCategories, maxPrice, inStockOnly };
    }

    function renderProducts() {
      const { selectedCategories, maxPrice, inStockOnly } = getActiveFilters();

      const filtered = PRODUCTS.filter(product => {
        const matchCategory = selectedCategories.length === 0 || selectedCategories.includes(product.category);
        const matchPrice = product.price <= maxPrice;
        const matchStock = !inStockOnly || product.inStock;
        return matchCategory && matchPrice && matchStock;
      });

      // Update Grid
      if (filtered.length === 0) {
        productGrid.innerHTML = `
          <div class="empty-state">
            <h3>Tidak Ada Produk Ditemukan</h3>
            <p>Coba sesuaikan atau hapus beberapa filter Anda.</p>
          </div>
        `;
      } else {
        productGrid.innerHTML = filtered.map(p => `
          <article class="product-card">
            <span class="product-badge">${p.category}</span>
            <h3 class="product-title">${p.name}</h3>
            <div class="product-price">${formatRupiah(p.price)}</div>
            <div class="product-meta">
              <span>⭐ ${p.rating}</span>
              <span style="color: ${p.inStock ? '#16a34a' : '#dc2626'}">${p.inStock ? 'Tersedia' : 'Stok Habis'}</span>
            </div>
          </article>
        `).join('');
      }

      renderChips(selectedCategories, maxPrice, inStockOnly);
      
      // Announce for accessibility
      ariaAnnouncer.textContent = `Menampilkan ${filtered.length} produk.`;
    }

    function renderChips(categories, maxPrice, inStockOnly) {
      activeChipsContainer.innerHTML = '';
      let hasFilters = false;

      categories.forEach(cat => {
        hasFilters = true;
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `Kategori: ${cat} <button type="button" aria-label="Hapus filter ${cat}" onclick="removeCategory('${cat}')">&times;</button>`;
        activeChipsContainer.appendChild(chip);
      });

      if (maxPrice < 5000000) {
        hasFilters = true;
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `Maks: ${formatRupiah(maxPrice)} <button type="button" aria-label="Hapus filter harga" onclick="resetPrice()">&times;</button>`;
        activeChipsContainer.appendChild(chip);
      }

      if (inStockOnly) {
        hasFilters = true;
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `Stok Tersedia <button type="button" aria-label="Hapus filter stok" onclick="removeStockFilter()">&times;</button>`;
        activeChipsContainer.appendChild(chip);
      }

      if (hasFilters) {
        const clearAllBtn = document.createElement('button');
        clearAllBtn.className = 'btn-reset';
        clearAllBtn.textContent = 'Hapus Semua Filter';
        clearAllBtn.onclick = resetAllFilters;
        activeChipsContainer.appendChild(clearAllBtn);
      }
    }

    // Global helper handlers bound to chip close actions
    window.removeCategory = function(cat) {
      const checkbox = filterForm.querySelector(`input[name="category"][value="${cat}"]`);
      if (checkbox) checkbox.checked = false;
      renderProducts();
    };

    window.resetPrice = function() {
      priceSlider.value = 5000000;
      priceDisplay.textContent = formatRupiah(5000000);
      renderProducts();
    };

    window.removeStockFilter = function() {
      const checkbox = filterForm.querySelector('input[name="inStockOnly"]');
      if (checkbox) checkbox.checked = false;
      renderProducts();
    };

    function resetAllFilters() {
      filterForm.reset();
      priceSlider.value = 5000000;
      priceDisplay.textContent = formatRupiah(5000000);
      renderProducts();
    }

    // Event Listeners
    filterForm.addEventListener('change', renderProducts);

    priceSlider.addEventListener('input', (e) => {
      priceDisplay.textContent = formatRupiah(e.target.value);
      renderProducts();
    });

    resetBtn.addEventListener('click', resetAllFilters);

    // Mobile Drawer Handlers
    const isMobile = () => window.innerWidth <= 768;

    openMobileBtn.addEventListener('click', () => {
      filterPanel.classList.add('is-open');
      closeMobileBtn.style.display = 'block';
    });

    closeMobileBtn.addEventListener('click', () => {
      filterPanel.classList.remove('is-open');
    });

    // Initialize
    updateCounts();
    renderProducts();
  </script>
</body>
</html>
